<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WolfLog PRO</title>
  <style>
    :root {
      --bg: #09090b;
      --bg-soft: #18181b;
      --card: #111113;
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: #a1a1aa;
      --gold: #fbbf24;
      --gold-2: #a16207;
      --green: #34d399;
      --red: #f87171;
      --blue: #60a5fa;
      --amber: #fbbf24;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #09090b, #09090b, #000);
      color: var(--text);
    }
    .hidden { display: none !important; }
    .container { max-width: 1280px; margin: 0 auto; padding: 24px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 14px 40px rgba(0,0,0,.25);
    }
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .layout { display: grid; grid-template-columns: 340px 1fr; gap: 16px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .between { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    h1,h2,h3,p { margin-top: 0; }
    .title { font-size: 18px; font-weight: 700; margin-bottom: 14px; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .logo-wrap { display:flex; gap:16px; align-items:center; }
    .logo-icon {
      width: 72px; height: 72px; border-radius: 24px; background: #000;
      display:flex; align-items:center; justify-content:center;
      border:1px solid rgba(251,191,36,.2);
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
    }
    .logo-title { font-size: 38px; font-weight: 800; }
    .gold {
      background: linear-gradient(90deg, #fde68a, #fbbf24, #a16207);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo-sub { text-transform: uppercase; letter-spacing: .28em; color: rgba(251,191,36,.72); font-size: 11px; }

    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      margin-top: 6px;
      background: #000;
      color: #fff;
      border: 1px solid #333;
      border-radius: 10px;
      font-size: 14px;
    }
    textarea { min-height: 100px; resize: vertical; }
    label { display: block; font-size: 14px; color: #ddd; }
    .field { margin-bottom: 14px; }
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
    }
    .btn-white { background: #fff; color: #000; }
    .btn-outline { background: transparent; color: #fff; border: 1px solid #444; }
    .btn-gold { background: var(--gold); color: #000; }
    .full { width: 100%; }
    .badge {
      display:inline-flex; align-items:center; gap:6px;
      border-radius:999px; padding:6px 10px; font-size:12px; font-weight:700;
    }
    .badge-dark { background:#27272a; color:#e4e4e7; }
    .badge-outline { border:1px solid #444; color:#ddd; }
    .badge-green { background: rgba(52,211,153,.15); color: #86efac; }
    .badge-amber { background: rgba(251,191,36,.15); color: #fcd34d; }
    .badge-blue { background: rgba(96,165,250,.15); color: #93c5fd; }
    .badge-red { background: rgba(248,113,113,.15); color: #fca5a5; }
    .stats p { margin-bottom: 4px; }
    .stat-value { font-size: 28px; font-weight: 800; }
    .tabs {
      display:grid; grid-template-columns: repeat(6,1fr); gap: 6px;
      background: var(--bg-soft); padding: 6px; border-radius: 18px; margin-top: 26px;
    }
    .tab {
      background: transparent; color: #fff; padding: 12px; border-radius: 12px; text-align:center;
    }
    .tab.active { background: #27272a; }
    .tab-panel { margin-top: 18px; }
    .item {
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }
    .progress {
      margin-top: 10px; height: 10px; border-radius: 999px; overflow: hidden; background: #27272a;
    }
    .progress > span {
      display:block; height:100%; background: linear-gradient(90deg,#fde68a,#fbbf24,#a16207);
    }
    .mode-switch { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .mode-btn {
      border:1px solid #444; background:#000; color:#aaa; border-radius:14px; padding:14px; text-align:left;
    }
    .mode-btn.active { border-color: var(--gold); background: rgba(251,191,36,.08); color:#fff; }
    .text-green { color: var(--green); }
    .text-red { color: var(--red); }
    .login-shell {
      min-height: 100vh; display:flex; align-items:center; justify-content:center; padding: 18px;
    }
    .login-card { width:100%; max-width: 460px; }
    .top-actions { display:flex; gap:10px; flex-wrap:wrap; }

    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: repeat(3,1fr); }
      .logo-title { font-size: 30px; }
    }
    @media (max-width: 640px) {
      .tabs { grid-template-columns: repeat(2,1fr); }
      .container { padding: 14px; }
    }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-shell">
    <div class="card login-card">
      <div class="logo-wrap" style="justify-content:center; margin-bottom:20px;">
        <div class="logo-icon">
          <svg viewBox="0 0 120 120" width="44" height="44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 70C30 40 55 20 85 18C75 28 72 35 72 35C85 32 98 38 105 48C95 50 88 58 82 68C75 80 55 95 30 100L20 70Z" fill="url(#goldMain)" />
            <path d="M25 85C45 95 75 90 105 60" stroke="url(#goldStrong)" stroke-width="6" stroke-linecap="round" />
            <circle cx="75" cy="48" r="2.5" fill="#000" />
            <defs>
              <linearGradient id="goldMain" x1="20" y1="18" x2="105" y2="100" gradientUnits="userSpaceOnUse">
                <stop stop-color="#FDE68A" /><stop offset="0.5" stop-color="#FBBF24" /><stop offset="1" stop-color="#A16207" />
              </linearGradient>
              <linearGradient id="goldStrong" x1="25" y1="60" x2="105" y2="95" gradientUnits="userSpaceOnUse">
                <stop stop-color="#FBBF24" /><stop offset="1" stop-color="#78350F" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <div class="logo-title">Wolf<span class="gold">Log</span></div>
          <div class="logo-sub">Trading Intelligence</div>
        </div>
      </div>
      <h2 style="text-align:center; font-size:28px; margin-bottom:8px;">Entrar na WolfLog</h2>
      <p class="muted" style="text-align:center; margin-bottom:20px;">Acede ao teu journal, contas e saques.</p>
      <div class="field">
        <label>Email</label>
        <input id="loginEmail" placeholder="Email" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="loginPassword" type="password" placeholder="Password" />
      </div>
      <button id="loginBtn" class="btn-white full">Entrar</button>
    </div>
  </div>

  <div id="appScreen" class="hidden">
    <div class="container">
      <div class="between" style="align-items:flex-start; margin-bottom:18px;">
        <div>
          <div class="logo-wrap">
            <div class="logo-icon">
              <svg viewBox="0 0 120 120" width="52" height="52" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 70C30 40 55 20 85 18C75 28 72 35 72 35C85 32 98 38 105 48C95 50 88 58 82 68C75 80 55 95 30 100L20 70Z" fill="url(#goldMain2)" />
                <path d="M25 85C45 95 75 90 105 60" stroke="url(#goldStrong2)" stroke-width="6" stroke-linecap="round" />
                <circle cx="75" cy="48" r="2.5" fill="#000" />
                <defs>
                  <linearGradient id="goldMain2" x1="20" y1="18" x2="105" y2="100" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#FDE68A" /><stop offset="0.5" stop-color="#FBBF24" /><stop offset="1" stop-color="#A16207" />
                  </linearGradient>
                  <linearGradient id="goldStrong2" x1="25" y1="60" x2="105" y2="95" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#FBBF24" /><stop offset="1" stop-color="#78350F" />
                  </linearGradient>
                </defs>
              </svg>
            </div>
            <div>
              <div class="logo-title">Wolf<span class="gold">Log</span></div>
              <div class="logo-sub">Trading Intelligence</div>
            </div>
          </div>
          <p class="muted" style="max-width:760px; margin-top:14px;">Versão PRO com dashboard, trades, contas de avaliação vs financiadas e registo completo de saques.</p>
        </div>
        <div class="top-actions">
          <button id="proBtn" class="btn-white">Upgrade Pro</button>
          <button id="exportBtn" class="btn-outline">Exportar dados</button>
          <button id="logoutBtn" class="btn-outline">Sair</button>
        </div>
      </div>

      <div id="statsGrid" class="grid grid-3 stats"></div>

      <div class="tabs">
        <button class="tab active" data-tab="dashboard">Dashboard</button>
        <button class="tab" data-tab="trades">Trades</button>
        <button class="tab" data-tab="accounts">Contas</button>
        <button class="tab" data-tab="stats">Estatísticas</button>
        <button class="tab" data-tab="pricing">PRO</button>
        <button class="tab" data-tab="withdrawals">Saques</button>
      </div>

      <div id="dashboard" class="tab-panel"></div>
      <div id="trades" class="tab-panel hidden"></div>
      <div id="accounts" class="tab-panel hidden"></div>
      <div id="stats" class="tab-panel hidden"></div>
      <div id="pricing" class="tab-panel hidden"></div>
      <div id="withdrawals" class="tab-panel hidden"></div>
    </div>
  </div>

  <script>
    const storageKeys = {
      auth: 'wolflog_pro_auth',
      pro: 'wolflog_pro_plan',
      accounts: 'wolflog_pro_accounts',
      trades: 'wolflog_pro_trades',
      withdrawals: 'wolflog_pro_withdrawals'
    };

    const initialAccounts = [
      {
        id: 1, firm: 'FTMO', phase: 'Challenge', accountName: 'FTMO 100K', initialBalance: 100000,
        currentBalance: 103250, target: 10000, dailyLossLimit: 5000, overallDrawdown: 10000,
        minTradingDays: 4, completedDays: 3, mode: 'manual', connectionType: 'manual', platform: '',
        isEvaluation: true, payoutEligible: false, totalWithdrawn: 0, nextPayoutDate: ''
      },
      {
        id: 2, firm: 'Apex', phase: 'Funded', accountName: 'Apex 50K', initialBalance: 50000,
        currentBalance: 51240, target: 3000, dailyLossLimit: 2500, overallDrawdown: 3000,
        minTradingDays: 0, completedDays: 18, mode: 'api', connectionType: 'csv', platform: 'Tradovate',
        isEvaluation: false, payoutEligible: true, totalWithdrawn: 1800, nextPayoutDate: '2026-03-28'
      }
    ];

    const initialTrades = [
      { id: 1, date: '2026-03-03', asset: 'EURUSD', side: 'Buy', account: 'FTMO 100K', setup: 'Breakout', result: 420, emotion: 'Calmo', notes: 'Entrada limpa na abertura de Londres.' },
      { id: 2, date: '2026-03-04', asset: 'XAUUSD', side: 'Sell', account: 'Apex 50K', setup: 'Reversão', result: -180, emotion: 'Impaciente', notes: 'Entrei cedo demais.' },
      { id: 3, date: '2026-03-05', asset: 'NAS100', side: 'Buy', account: 'FTMO 100K', setup: 'Pullback', result: 650, emotion: 'Confiante', notes: 'Boa execução e saída parcial.' }
    ];

    const initialWithdrawals = [
      { id: 1, accountName: 'Apex 50K', firm: 'Apex', date: '2026-02-18', amount: 1200, status: 'Recebido', notes: 'Primeiro saque da conta financiada.' },
      { id: 2, accountName: 'Apex 50K', firm: 'Apex', date: '2026-03-02', amount: 600, status: 'Pago', notes: 'Saque intermédio.' }
    ];

    let state = {
      isLoggedIn: false,
      email: '',
      isPro: false,
      accounts: [...initialAccounts],
      trades: [...initialTrades],
      withdrawals: [...initialWithdrawals],
      activeTab: 'dashboard'
    };

    function currency(value) {
      return new Intl.NumberFormat('pt-PT', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(value || 0);
    }

    function saveState() {
      localStorage.setItem(storageKeys.auth, JSON.stringify({ isLoggedIn: state.isLoggedIn, email: state.email }));
      localStorage.setItem(storageKeys.pro, JSON.stringify(state.isPro));
      localStorage.setItem(storageKeys.accounts, JSON.stringify(state.accounts));
      localStorage.setItem(storageKeys.trades, JSON.stringify(state.trades));
      localStorage.setItem(storageKeys.withdrawals, JSON.stringify(state.withdrawals));
    }

    function loadState() {
      try {
        const auth = JSON.parse(localStorage.getItem(storageKeys.auth) || 'null');
        const pro = JSON.parse(localStorage.getItem(storageKeys.pro) || 'false');
        const accounts = JSON.parse(localStorage.getItem(storageKeys.accounts) || 'null');
        const trades = JSON.parse(localStorage.getItem(storageKeys.trades) || 'null');
        const withdrawals = JSON.parse(localStorage.getItem(storageKeys.withdrawals) || 'null');
        if (auth) {
          state.isLoggedIn = !!auth.isLoggedIn;
          state.email = auth.email || '';
        }
        if (typeof pro === 'boolean') state.isPro = pro;
        if (accounts) state.accounts = accounts;
        if (trades) state.trades = trades;
        if (withdrawals) state.withdrawals = withdrawals;
      } catch (e) {
        console.error('Erro ao carregar dados', e);
      }
    }

    function getTotals() {
      const totalBalance = state.accounts.reduce((sum, a) => sum + a.currentBalance, 0);
      const pnl = state.trades.reduce((sum, t) => sum + t.result, 0);
      const wins = state.trades.filter(t => t.result > 0);
      const losses = state.trades.filter(t => t.result < 0);
      const fundedAccounts = state.accounts.filter(a => a.phase === 'Funded').length;
      const evaluationAccounts = state.accounts.filter(a => a.phase !== 'Funded').length;
      const totalWithdrawn = state.withdrawals.reduce((sum, w) => sum + w.amount, 0);
      const winRate = state.trades.length ? Math.round((wins.length / state.trades.length) * 100) : 0;
      const grossProfit = wins.reduce((sum, t) => sum + t.result, 0);
      const grossLoss = Math.abs(losses.reduce((sum, t) => sum + t.result, 0));
      const profitFactor = grossLoss ? (grossProfit / grossLoss).toFixed(2) : '—';
      return { totalBalance, pnl, fundedAccounts, evaluationAccounts, totalWithdrawn, winRate, profitFactor };
    }

    function getAlerts() {
      const items = [];
      state.accounts.forEach(a => {
        const gain = a.currentBalance - a.initialBalance;
        const targetProgress = a.target ? Math.max(0, Math.min(100, (gain / a.target) * 100)) : 0;
        const ddRemaining = a.overallDrawdown - Math.max(0, a.initialBalance - a.currentBalance);
        if (a.phase !== 'Funded' && targetProgress >= 80 && targetProgress < 100) items.push({ type: 'green', text: `${a.accountName}: estás a ${Math.round(targetProgress)}% do target.` });
        if (a.overallDrawdown > 0 && ddRemaining <= a.overallDrawdown * 0.2) items.push({ type: 'red', text: `${a.accountName}: atenção ao drawdown total.` });
        if (a.phase !== 'Funded' && a.completedDays < a.minTradingDays) items.push({ type: 'amber', text: `${a.accountName}: faltam ${a.minTradingDays - a.completedDays} dias mínimos.` });
        if (a.phase === 'Funded' && a.nextPayoutDate) items.push({ type: 'blue', text: `${a.accountName}: próximo saque em ${a.nextPayoutDate}.` });
      });
      if (!items.length) items.push({ type: 'muted', text: 'Tudo sob controlo. Continua disciplinado.' });
      return items.slice(0, 6);
    }

    function renderStatsGrid() {
      const totals = getTotals();
      const cards = [
        { t: 'Saldo total', v: currency(totals.totalBalance), s: 'Todas as contas' },
        { t: 'Contas em avaliação', v: String(totals.evaluationAccounts), s: 'Challenge + Verification' },
        { t: 'Contas financiadas', v: String(totals.fundedAccounts), s: 'Prontas para sacar' },
        { t: 'P/L acumulado', v: currency(totals.pnl), s: 'Baseado no journal' },
        { t: 'Total sacado', v: currency(totals.totalWithdrawn), s: 'Histórico de payouts' },
        { t: 'Profit factor', v: String(totals.profitFactor), s: 'Relação lucro/perda' }
      ];
      document.getElementById('statsGrid').innerHTML = cards.map(c => `
        <div class="card">
          <p class="muted">${c.t}</p>
          <p class="stat-value">${c.v}</p>
          <p class="small muted">${c.s}</p>
        </div>
      `).join('');
      document.getElementById('proBtn').textContent = state.isPro ? 'Plano PRO ativo' : 'Upgrade Pro';
    }

    function renderDashboard() {
      const alerts = getAlerts();
      const accountsHtml = state.accounts.map(account => {
        const gain = account.currentBalance - account.initialBalance;
        const targetProgress = account.target ? Math.max(0, Math.min(100, (gain / account.target) * 100)) : 0;
        return `
          <div class="item">
            <div class="between" style="align-items:flex-start;">
              <div>
                <div class="row">
                  <strong>${account.accountName}</strong>
                  <span class="badge badge-dark">${account.phase}</span>
                  <span class="badge badge-outline">${account.firm}</span>
                </div>
                <p class="muted small" style="margin-top:8px;">Saldo atual: ${currency(account.currentBalance)} · ${account.phase === 'Funded' ? `Total sacado: ${currency(account.totalWithdrawn)}` : `Target: ${currency(account.target)}`}</p>
                <div class="row" style="margin-top:8px;">
                  <span class="badge ${account.phase === 'Funded' ? 'badge-green' : 'badge-amber'}">${account.phase === 'Funded' ? 'Conta financiada' : 'Conta em avaliação'}</span>
                  ${account.phase === 'Funded' && account.nextPayoutDate ? `<span class="badge badge-outline">Próximo saque: ${account.nextPayoutDate}</span>` : ''}
                </div>
              </div>
              <div class="small muted">Dias mínimos: ${account.completedDays}/${account.minTradingDays}</div>
            </div>
            ${account.phase !== 'Funded' ? `
              <div style="margin-top:14px;">
                <div class="between"><span class="small muted">Progresso para o target</span><span class="small muted">${Math.round(targetProgress)}%</span></div>
                <div class="progress"><span style="width:${targetProgress}%"></span></div>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');

      const alertsHtml = alerts.map(alert => `
        <div class="item"><span class="badge ${alert.type === 'red' ? 'badge-red' : alert.type === 'green' ? 'badge-green' : alert.type === 'amber' ? 'badge-amber' : alert.type === 'blue' ? 'badge-blue' : 'badge-outline'}">${alert.text}</span></div>
      `).join('');

      document.getElementById('dashboard').innerHTML = `
        <div class="grid grid-2">
          <div class="card">
            <h2 class="title">Contas ativas</h2>
            <div class="grid">${accountsHtml}</div>
          </div>
          <div class="card">
            <h2 class="title">Alertas inteligentes</h2>
            <div class="grid">${alertsHtml}</div>
          </div>
        </div>
      `;
    }

    function renderTrades() {
      const accountOptions = state.accounts.map(a => `<option value="${a.accountName}">${a.accountName}</option>`).join('');
      const list = state.trades.map(trade => `
        <div class="item">
          <div class="between" style="align-items:flex-start;">
            <div>
              <div class="row">
                <strong>${trade.asset}</strong>
                <span class="badge badge-dark">${trade.side}</span>
                ${trade.setup ? `<span class="badge badge-outline">${trade.setup}</span>` : ''}
              </div>
              <p class="muted small" style="margin-top:8px;">${trade.date} · ${trade.account}</p>
              ${trade.emotion ? `<p class="small muted">Estado emocional: ${trade.emotion}</p>` : ''}
              ${trade.notes ? `<p>${trade.notes}</p>` : ''}
            </div>
            <div class="${trade.result >= 0 ? 'text-green' : 'text-red'}"><strong>${currency(trade.result)}</strong></div>
          </div>
        </div>
      `).join('');

      document.getElementById('trades').innerHTML = `
        <div class="layout">
          <div class="card">
            <h2 class="title">Nova operação</h2>
            <div class="field"><label>Data</label><input id="tradeDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
            <div class="field"><label>Ativo</label><input id="tradeAsset" placeholder="EURUSD, XAUUSD, NAS100..."></div>
            <div class="field"><label>Direção</label><select id="tradeSide"><option>Buy</option><option>Sell</option></select></div>
            <div class="field"><label>Conta</label><select id="tradeAccount">${accountOptions}</select></div>
            <div class="field"><label>Setup</label><input id="tradeSetup" placeholder="Breakout, Pullback..."></div>
            <div class="field"><label>Resultado</label><input id="tradeResult" type="number" placeholder="Ex.: 250 ou -120"></div>
            <div class="field"><label>Emoção</label><input id="tradeEmotion" placeholder="Calmo, confiante, ansioso..."></div>
            <div class="field"><label>Notas</label><textarea id="tradeNotes" placeholder="Porque entraste? O que correu bem ou mal?"></textarea></div>
            <button id="saveTradeBtn" class="btn-white full">Guardar trade</button>
          </div>
          <div class="card">
            <h2 class="title">Journal de operações</h2>
            <div class="grid">${list || '<p class="muted">Sem trades ainda.</p>'}</div>
          </div>
        </div>
      `;

      document.getElementById('saveTradeBtn').onclick = () => {
        const asset = document.getElementById('tradeAsset').value.trim();
        const result = document.getElementById('tradeResult').value;
        if (!asset || result === '') return alert('Preenche ativo e resultado.');
        state.trades.unshift({
          id: Date.now(),
          date: document.getElementById('tradeDate').value,
          asset,
          side: document.getElementById('tradeSide').value,
          account: document.getElementById('tradeAccount').value,
          setup: document.getElementById('tradeSetup').value,
          result: Number(result),
          emotion: document.getElementById('tradeEmotion').value,
          notes: document.getElementById('tradeNotes').value
        });
        saveState();
        renderAll();
      };
    }

    function renderAccounts() {
      const accountCards = state.accounts.map(account => {
        const pnl = account.currentBalance - account.initialBalance;
        const drawdownUsed = Math.max(0, account.initialBalance - account.currentBalance);
        const ddProgress = account.overallDrawdown ? Math.min(100, (drawdownUsed / account.overallDrawdown) * 100) : 0;
        return `
          <div class="card">
            <div class="between" style="align-items:flex-start;">
              <div>
                <div class="row">
                  <strong style="font-size:20px;">${account.accountName}</strong>
                  <span class="badge badge-dark">${account.phase}</span>
                </div>
                <p class="muted small" style="margin-top:8px;">${account.firm}</p>
                <div class="row" style="margin-top:8px;">
                  <span class="badge ${account.phase === 'Funded' ? 'badge-green' : 'badge-amber'}">${account.phase === 'Funded' ? 'Financiada' : 'Teste / Avaliação'}</span>
                  ${account.phase === 'Funded' && account.nextPayoutDate ? `<span class="badge badge-outline">Próximo saque: ${account.nextPayoutDate}</span>` : ''}
                </div>
                <div class="row" style="margin-top:8px;">
                  <span class="badge badge-outline">${account.mode === 'api' ? 'Ligação automática' : 'Manual'}</span>
                  ${account.mode === 'api' ? `<span class="badge badge-amber">${account.connectionType === 'api' ? 'API' : account.connectionType === 'read-only' ? 'Read-only' : 'CSV'}</span>` : ''}
                  ${account.platform ? `<span class="badge badge-outline">${account.platform}</span>` : ''}
                </div>
              </div>
              <div class="${pnl >= 0 ? 'text-green' : 'text-red'}"><strong>${currency(pnl)}</strong></div>
            </div>
            <div class="grid grid-2" style="margin-top:14px;">
              <div class="item"><div class="small muted">Saldo atual</div><div style="margin-top:8px;"><strong>${currency(account.currentBalance)}</strong></div></div>
              <div class="item"><div class="small muted">${account.phase === 'Funded' ? 'Sacado' : 'Target'}</div><div style="margin-top:8px;"><strong>${account.phase === 'Funded' ? currency(account.totalWithdrawn) : currency(account.target)}</strong></div></div>
              <div class="item"><div class="small muted">Loss diário</div><div style="margin-top:8px;"><strong>${currency(account.dailyLossLimit)}</strong></div></div>
              <div class="item"><div class="small muted">Dias</div><div style="margin-top:8px;"><strong>${account.completedDays}/${account.minTradingDays}</strong></div></div>
            </div>
            <div style="margin-top:14px;">
              <div class="between"><span class="small muted">Uso do drawdown total</span><span class="small muted">${Math.round(ddProgress)}%</span></div>
              <div class="progress"><span style="width:${ddProgress}%"></span></div>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('accounts').innerHTML = `
        <div class="layout">
          <div class="card">
            <h2 class="title">Adicionar conta</h2>
            <div class="field">
              <label>Modo de conta</label>
              <div class="mode-switch">
                <button id="modeManual" class="mode-btn active">Manual<br><span class="small muted">Inserção manual de saldo e regras.</span></button>
                <button id="modeApi" class="mode-btn">Ligação automática<br><span class="small muted">CSV, API ou leitura.</span></button>
              </div>
            </div>
            <div id="apiFields" class="hidden">
              <div class="field"><label>Tipo de conexão</label><select id="accountConnectionType"><option value="csv">Importação CSV</option><option value="api">API</option><option value="read-only">Read-only / Investor</option></select></div>
              <div class="field"><label>Plataforma</label><select id="accountPlatform"><option value="">Escolher plataforma</option><option>MT5</option><option>cTrader</option><option>DXtrade</option><option>Tradovate</option><option>MatchTrader</option></select></div>
            </div>
            <div class="field"><label>Prop firm</label><input id="accountFirm" placeholder="FTMO, Apex, 5ers..."></div>
            <div class="field"><label>Fase</label><select id="accountPhase"><option>Challenge</option><option>Verification</option><option>Funded</option></select></div>
            <div class="field hidden" id="payoutField"><label>Próxima data de saque</label><input id="accountPayoutDate" type="date"></div>
            <div class="field"><label>Nome da conta</label><input id="accountName" placeholder="FTMO 100K"></div>
            <div class="grid grid-2">
              <div class="field"><label>Saldo inicial</label><input id="accountInitialBalance" type="number"></div>
              <div class="field"><label>Saldo atual</label><input id="accountCurrentBalance" type="number"></div>
            </div>
            <div class="grid grid-2">
              <div class="field"><label>Target</label><input id="accountTarget" type="number"></div>
              <div class="field"><label>Loss diário</label><input id="accountDailyLoss" type="number"></div>
            </div>
            <div class="grid grid-2">
              <div class="field"><label>Drawdown total</label><input id="accountDrawdown" type="number"></div>
              <div class="field"><label>Dias mínimos</label><input id="accountMinDays" type="number"></div>
            </div>
            <div class="field"><label>Dias feitos</label><input id="accountCompletedDays" type="number"></div>
            <button id="saveAccountBtn" class="btn-white full">Guardar conta</button>
          </div>
          <div class="grid">${accountCards}</div>
        </div>
      `;

      let mode = 'manual';
      document.getElementById('modeManual').onclick = () => {
        mode = 'manual';
        document.getElementById('modeManual').classList.add('active');
        document.getElementById('modeApi').classList.remove('active');
        document.getElementById('apiFields').classList.add('hidden');
      };
      document.getElementById('modeApi').onclick = () => {
        mode = 'api';
        document.getElementById('modeApi').classList.add('active');
        document.getElementById('modeManual').classList.remove('active');
        document.getElementById('apiFields').classList.remove('hidden');
      };
      document.getElementById('accountPhase').onchange = (e) => {
        document.getElementById('payoutField').classList.toggle('hidden', e.target.value !== 'Funded');
      };
      document.getElementById('saveAccountBtn').onclick = () => {
        const firm = document.getElementById('accountFirm').value.trim();
        const accountName = document.getElementById('accountName').value.trim();
        if (!firm || !accountName) return alert('Preenche a prop firm e o nome da conta.');
        if (!state.isPro && state.accounts.length >= 2) return alert('O plano gratuito permite até 2 contas. Ativa o PRO para adicionares mais contas.');
        const phase = document.getElementById('accountPhase').value;
        const funded = phase === 'Funded';
        state.accounts.push({
          id: Date.now(),
          firm,
          phase,
          accountName,
          initialBalance: Number(document.getElementById('accountInitialBalance').value || 0),
          currentBalance: Number(document.getElementById('accountCurrentBalance').value || 0),
          target: Number(document.getElementById('accountTarget').value || 0),
          dailyLossLimit: Number(document.getElementById('accountDailyLoss').value || 0),
          overallDrawdown: Number(document.getElementById('accountDrawdown').value || 0),
          minTradingDays: Number(document.getElementById('accountMinDays').value || 0),
          completedDays: Number(document.getElementById('accountCompletedDays').value || 0),
          mode,
          connectionType: mode === 'api' ? document.getElementById('accountConnectionType').value : 'manual',
          platform: mode === 'api' ? document.getElementById('accountPlatform').value : '',
          isEvaluation: !funded,
          payoutEligible: funded,
          totalWithdrawn: 0,
          nextPayoutDate: funded ? document.getElementById('accountPayoutDate').value : ''
        });
        saveState();
        renderAll();
      };
    }

    function renderStatsPage() {
      const totals = getTotals();
      const map = {};
      state.trades.forEach(t => {
        if (!t.setup) return;
        if (!map[t.setup]) map[t.setup] = { count: 0, pnl: 0 };
        map[t.setup].count += 1;
        map[t.setup].pnl += t.result;
      });
      const setups = Object.entries(map).map(([setup, data]) => ({ setup, ...data })).sort((a,b) => b.pnl - a.pnl);
      document.getElementById('stats').innerHTML = `
        <div class="grid grid-2">
          <div class="card">
            <h2 class="title">Resumo de performance</h2>
            <div class="grid grid-2">
              <div class="item"><div class="small muted">Operações totais</div><div class="stat-value">${state.trades.length}</div></div>
              <div class="item"><div class="small muted">Win rate</div><div class="stat-value">${totals.winRate}%</div></div>
              <div class="item"><div class="small muted">P/L acumulado</div><div class="stat-value">${currency(totals.pnl)}</div></div>
              <div class="item"><div class="small muted">Profit factor</div><div class="stat-value">${totals.profitFactor}</div></div>
            </div>
          </div>
          <div class="card">
            <h2 class="title">Setups ordenados por P/L</h2>
            <div class="grid">
              ${setups.length ? setups.map(item => `
                <div class="item between">
                  <div><strong>${item.setup}</strong><div class="small muted" style="margin-top:8px;">${item.count} registos</div></div>
                  <div class="${item.pnl >= 0 ? 'text-green' : 'text-red'}"><strong>${currency(item.pnl)}</strong></div>
                </div>
              `).join('') : '<p class="muted">Adiciona trades para veres estatísticas.</p>'}
            </div>
          </div>
        </div>
      `;
    }

    function renderPricing() {
      document.getElementById('pricing').innerHTML = `
        <div class="grid grid-2">
          <div class="card">
            <h2 class="title">Plano Gratuito</h2>
            <p class="muted">✔ Até 2 contas</p>
            <p class="muted">✔ Logbook completo</p>
            <p class="muted">✔ Estatísticas básicas</p>
            <p class="muted">✔ Uso ilimitado manual</p>
            <p class="muted">✔ Separação entre contas em avaliação e financiadas</p>
            <button class="btn-outline full" disabled>Plano Atual</button>
          </div>
          <div class="card" style="background:linear-gradient(135deg,#18181b,#000); border-color: rgba(251,191,36,.25);">
            <h2 class="title" style="color:#fde68a;">Plano PRO</h2>
            <div style="font-size:32px; font-weight:800; margin-bottom:16px;">€9,90/mês</div>
            <p class="muted">✔ Contas ilimitadas</p>
            <p class="muted">✔ Integração API / CSV</p>
            <p class="muted">✔ Alertas inteligentes</p>
            <p class="muted">✔ Estatísticas avançadas</p>
            <p class="muted">✔ Registo e histórico completo de saques</p>
            <button id="pricingProBtn" class="btn-gold full">Ativar PRO</button>
          </div>
        </div>
      `;
      document.getElementById('pricingProBtn').onclick = () => {
        state.isPro = true;
        saveState();
        renderAll();
      };
    }

    function renderWithdrawals() {
      const funded = state.accounts.filter(a => a.phase === 'Funded');
      const options = funded.map(a => `<option value="${a.accountName}">${a.accountName}</option>`).join('');
      const history = state.withdrawals.map(w => `
        <div class="item">
          <div class="between" style="align-items:flex-start;">
            <div>
              <div class="row">
                <strong>${w.accountName}</strong>
                <span class="badge badge-outline">${w.firm}</span>
                <span class="badge ${w.status === 'Recebido' ? 'badge-green' : w.status === 'Pago' ? 'badge-blue' : 'badge-amber'}">${w.status}</span>
              </div>
              <p class="muted small" style="margin-top:8px;">${w.date}</p>
              ${w.notes ? `<p>${w.notes}</p>` : ''}
            </div>
            <div class="text-green"><strong>${currency(w.amount)}</strong></div>
          </div>
        </div>
      `).join('');
      document.getElementById('withdrawals').innerHTML = `
        <div class="layout">
          <div class="card">
            <h2 class="title">Registar saque</h2>
            <div class="field"><label>Conta financiada</label><select id="withdrawAccount">${options}</select></div>
            <div class="field"><label>Data</label><input id="withdrawDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
            <div class="field"><label>Valor</label><input id="withdrawAmount" type="number" placeholder="Ex.: 1000"></div>
            <div class="field"><label>Estado</label><select id="withdrawStatus"><option>Pedido</option><option>Pago</option><option>Recebido</option></select></div>
            <div class="field"><label>Notas</label><textarea id="withdrawNotes" placeholder="Observações sobre o saque"></textarea></div>
            <button id="saveWithdrawBtn" class="btn-white full">Guardar saque</button>
          </div>
          <div class="card">
            <h2 class="title">Histórico de saques</h2>
            <div class="grid">${history || '<p class="muted">Sem saques ainda.</p>'}</div>
          </div>
        </div>
      `;

      document.getElementById('saveWithdrawBtn').onclick = () => {
        const accountName = document.getElementById('withdrawAccount').value;
        const amount = document.getElementById('withdrawAmount').value;
        if (!accountName || amount === '') return alert('Preenche conta e valor.');
        const acc = state.accounts.find(a => a.accountName === accountName);
        state.withdrawals.unshift({
          id: Date.now(),
          accountName,
          firm: acc ? acc.firm : '',
          date: document.getElementById('withdrawDate').value,
          amount: Number(amount),
          status: document.getElementById('withdrawStatus').value,
          notes: document.getElementById('withdrawNotes').value
        });
        state.accounts = state.accounts.map(a => a.accountName === accountName ? { ...a, totalWithdrawn: a.totalWithdrawn + Number(amount) } : a);
        saveState();
        renderAll();
      };
    }

    function setActiveTab(tab) {
      state.activeTab = tab;
      document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
      document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.add('hidden'));
      document.getElementById(tab).classList.remove('hidden');
    }

    function renderAll() {
      renderStatsGrid();
      renderDashboard();
      renderTrades();
      renderAccounts();
      renderStatsPage();
      renderPricing();
      renderWithdrawals();
      setActiveTab(state.activeTab);
      saveState();
    }

    document.getElementById('loginBtn').onclick = () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      if (!email || !password) return alert('Preenche email e password.');
      state.isLoggedIn = true;
      state.email = email;
      saveState();
      boot();
    };

    document.getElementById('logoutBtn').onclick = () => {
      state.isLoggedIn = false;
      saveState();
      boot();
    };

    document.getElementById('exportBtn').onclick = () => {
      const payload = {
        exportedAt: new Date().toISOString(),
        email: state.email,
        isPro: state.isPro,
        accounts: state.accounts,
        trades: state.trades,
        withdrawals: state.withdrawals
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'wolflog-pro-export.json';
      link.click();
      URL.revokeObjectURL(url);
    };

    document.getElementById('proBtn').onclick = () => {
      state.isPro = true;
      saveState();
      renderAll();
    };

    document.querySelectorAll('.tab').forEach(btn => {
      btn.onclick = () => setActiveTab(btn.dataset.tab);
    });

    function boot() {
      loadState();
      document.getElementById('loginScreen').classList.toggle('hidden', state.isLoggedIn);
      document.getElementById('appScreen').classList.toggle('hidden', !state.isLoggedIn);
      if (state.isLoggedIn) renderAll();
    }

    boot();
  </script>
</body>
</html>
